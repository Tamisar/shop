services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sneaker_user
      POSTGRES_PASSWORD: sneaker_pass
      POSTGRES_DB: sneaker_store
    volumes:
      - ./shop/backend/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sneaker_user -d sneaker_store"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./shop/backend
      dockerfile: dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: sneaker_user
      DB_PASSWORD: sneaker_pass
      DB_NAME: sneaker_store
      JWT_SECRET: super-secret-key-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./shop/frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pg_data:
