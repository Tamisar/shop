version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sneaker_user
      POSTGRES_PASSWORD: sneaker_pass
      POSTGRES_DB: sneaker_store
    ports:
      - "5432:5432"
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: sneaker_user
      DB_PASSWORD: sneaker_pass
      DB_NAME: sneaker_store
      JWT_SECRET: super-secret-key-change-in-prod
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pg_data: